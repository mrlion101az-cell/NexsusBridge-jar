bridge:
  enabled: true
  base-url: "https://kairos-ai-server.onrender.com"
  auth-token: "CHANGE_ME"
  connect-timeout-ms: 5000
  request-timeout-ms: 12000
  queue-capacity: 2000
  max-retries: 3
  retry-base-delay-ms: 750
  log-payloads: false

endpoints:
  repository: "/repository_event"
  inventory: "/inventory_event"
  npc: "/npc"
  world-event: "/world_event"
  player-kill: "/player_kill"
  grief-block: "/grief_block"

features:
  repository: true
  inventory-snapshots: true
  npc-interactions: true
  books: true
  signs: true
  regions: true
  block-interactions: true
  combat: true
  advancements: true
  crafting: true
  fishing: true
  portals: true
  sleeping: true

repository:
  remove-accepted-items: true
  require-artifact-tag: false
  artifact-key: "nexus_artifact"
  accepted-name-fragments:
    - "archive access badge"
  locations:
    fracture-main:
      world: "world"
      x: -16647
      y: 72
      z: 9648

inventory:
  snapshot-delay-ticks: 2
  include-ender-chest: false
  include-armor: true
  include-offhand: true

regions:
  check-every-ticks: 5
  definitions: {}
  # Example:
  # definitions:
  #   arrival-terminal:
  #     world: "world"
  #     min: [-16680, 60, 9600]
  #     max: [-16600, 100, 9700]

npc:
  citizens-metadata-key: "NPC"
  include-scoreboard-tagged: true
  scoreboard-tag: "nexus_npc"

security:
  redact-sensitive-config-in-status: true
