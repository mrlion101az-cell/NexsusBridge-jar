name: NexusBridge
version: ${version}
main: com.nexusuniverse.bridge.NexusBridgePlugin
api-version: '1.21'
author: Nexus Universe
description: Production event bridge between Paper and Kairos/Render.
commands:
  nexusbridge:
    description: NexusBridge and Kairos administration.
    aliases: [bridge, kairos]
    usage: /nexusbridge <status|ping|chat|repository|reload|test|flush|version|help>
    permission: nexusbridge.admin
permissions:
  nexusbridge.admin:
    description: Manage NexusBridge and communicate with Kairos.
    default: op
